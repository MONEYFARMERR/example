<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-deep:    #030d1c;
      --blue-mid:     #071e3d;
      --blue-cobalt:  #1a4a8a;
      --blue-bright:  #2a6dd9;
      --blue-sky:     #5ba3f5;
      --blue-pale:    #b8d9ff;
      --white:        #e8f1ff;
      --gold:         #c9a84c;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background-color: var(--blue-deep);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, #0a2a5e88 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 85% 80%, #12387a55 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, #1a4a8a22 0%, transparent 70%);
      font-family: 'Cormorant Garamond', serif;
      color: var(--white);
      min-height: 100vh;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* Animated floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift linear infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1a4a8a44, transparent 70%);
      top: -100px; left: -100px;
      animation-duration: 28s;
      animation-direction: alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #2a6dd933, transparent 70%);
      bottom: -80px; right: -60px;
      animation-duration: 22s;
      animation-delay: -10s;
      animation-direction: alternate-reverse;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #5ba3f522, transparent 70%);
      top: 40%; left: 55%;
      animation-duration: 18s;
      animation-delay: -5s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.05); }
      66%  { transform: translate(-20px, 20px) scale(0.97); }
      100% { transform: translate(30px, 10px) scale(1.03); }
    }

    /* Horizontal rule accent */
    .rule {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--blue-sky), transparent);
      margin: 0 auto;
    }

    /* Main layout */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 4rem 2rem;
      text-align: center;
    }

    /* Overline label */
    .overline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--blue-sky);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    /* Headline */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin: 1.5rem 0;
      background: linear-gradient(160deg, var(--white) 10%, var(--blue-pale) 50%, var(--blue-sky) 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 1.1s ease forwards 0.6s;
    }

    h1 em {
      font-style: italic;
      background: linear-gradient(160deg, var(--blue-sky) 0%, var(--blue-pale) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subheading */
    .sub {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      color: var(--blue-pale);
      max-width: 520px;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 1.1s ease forwards 0.9s;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.1s;
    }
    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider-line.right {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 3rem;
      margin-top: 3.5rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.3s;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--blue-sky);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--blue-pale);
      opacity: 0.65;
    }

    /* Bottom vertical rule */
    .bottom-rule {
      margin-top: 4rem;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards 1.6s;
    }

    /* Button */
    .cta {
      margin-top: 3rem;
      display: inline-block;
      padding: 0.9rem 2.8rem;
      border: 1px solid var(--blue-cobalt);
      color: var(--blue-pale);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease, border-color 0.4s ease;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.5s;
      cursor: pointer;
      background: transparent;
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--blue-cobalt), var(--blue-bright));
      transform: translateX(-110%);
      transition: transform 0.45s cubic-bezier(0.77, 0, 0.18, 1);
      z-index: -1;
    }
    .cta:hover { color: var(--white); border-color: var(--blue-bright); }
    .cta:hover::before { transform: translateX(0); }

    /* Decorative corner marks */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      opacity: 0.25;
    }
    .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--blue-sky); border-left: 1px solid var(--blue-sky); }
    .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--blue-sky); border-right: 1px solid var(--blue-sky); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--blue-sky); border-left: 1px solid var(--blue-sky); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--blue-sky); border-right: 1px solid var(--blue-sky); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="wrapper">
    <p class="overline">the colour of depth &amp; distance</p>

    <h1>Blue</h1>

    <p class="sub">
      The hue of oceans, skies, and twilight.
      A colour that breathes &mdash; vast, still, and endlessly deep.
    </p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line right"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-num">470</span>
        <span class="stat-label">nanometres</span>
      </div>
      <div class="stat">
        <span class="stat-num">∞</span>
        <span class="stat-label">horizons</span>
      </div>
      <div class="stat">
        <span class="stat-num">1</span>
        <span class="stat-label">feeling</span>
      </div>
    </div>

    <button class="cta">Dive Deeper</button>

    <div class="bottom-rule">
      <div class="rule"></div>
    </div>
  </div>

</body>
</html>
